<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="data:," />
    <title>Realm Conquest — 3D RTS</title>
    <style>
      :root {
        --panel: rgba(18, 22, 28, 0.82);
        --panel-edge: #3a4658;
        --gold: #f2d24e;
        --txt: #e7ecf3;
      }
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0b0f14;
        overscroll-behavior: none; -webkit-overflow-scrolling: auto; }
      body { font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif; color: var(--txt);
        user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
      /* touch-action:none keeps iPad/trackpad gestures (pan, pinch-zoom, two-finger
         scroll) flowing to the game instead of scrolling/zooming the Safari page. */
      #game { display: block; width: 100vw; height: 100vh; outline: none; touch-action: none; }

      .hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
      .hud > * { pointer-events: auto; }

      /* top resource bar */
      .hud-top {
        position: absolute; top: 0; left: 50%; transform: translateX(-50%);
        display: flex; gap: 0.4rem; padding: 0.45rem 0.9rem;
        background: linear-gradient(180deg, rgba(14,18,24,0.95), rgba(14,18,24,0.65));
        border: 1px solid var(--panel-edge); border-top: none;
        border-radius: 0 0 10px 10px;
      }
      .hud-stat { display: flex; align-items: center; gap: 0.35rem; padding: 0.15rem 0.7rem; font-size: 0.95rem; }
      .hud-stat + .hud-stat { border-left: 1px solid rgba(255,255,255,0.08); }
      .hud-stat .i { font-size: 1.05rem; }
      .hud-stat .n { color: #9fb0c4; font-size: 0.8rem; }
      .hud-stat b { font-variant-numeric: tabular-nums; min-width: 2.4ch; text-align: right; }

      /* minimap bottom-left */
      .hud-minimap {
        position: absolute; bottom: 0.7rem; left: 0.7rem;
        padding: 6px; background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 8px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.45);
      }

      /* command card bottom-center */
      .hud-card {
        position: absolute; bottom: 0.7rem; left: 50%; transform: translateX(-50%);
        min-width: 340px; max-width: 520px;
        background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 10px;
        padding: 0.6rem 0.8rem; box-shadow: 0 6px 18px rgba(0,0,0,0.45);
        display: flex; flex-wrap: wrap; gap: 0.45rem; align-items: stretch;
      }
      .hud-card-title { flex: 1 0 100%; font-weight: 600; font-size: 1rem; letter-spacing: 0.02em; }
      .hud-card-title span { color: #9fb0c4; font-weight: 400; font-size: 0.85rem; }
      .hud-tip { flex: 1 0 100%; color: #9fb0c4; font-size: 0.82rem; }
      .hud-queue { flex: 1 0 100%; color: var(--gold); font-size: 0.82rem; margin-top: 0.2rem; }

      .hud-btn {
        display: flex; flex-direction: column; align-items: flex-start; gap: 0.15rem;
        background: #1c2734; color: var(--txt); border: 1px solid #38506e;
        padding: 0.4rem 0.6rem; border-radius: 7px; cursor: pointer; font: inherit; min-width: 6.5rem;
        transition: background 0.12s, border-color 0.12s;
      }
      .hud-btn:hover { background: #25405e; border-color: #5b86bd; }
      .hud-btn .l { font-size: 0.88rem; font-weight: 600; }
      .hud-btn .c { font-size: 0.76rem; color: #b9c6d6; }

      /* event log bottom-right */
      .hud-log {
        position: absolute; bottom: 0.7rem; right: 0.7rem; width: 20rem; max-height: 9rem; overflow: hidden;
        background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 8px;
        padding: 0.4rem 0.6rem; font-size: 0.82rem; color: #c6d2e0;
      }
      .hud-log p { margin: 0 0 0.2rem; line-height: 1.25; }
      .hud-log p.warn { color: #ffcf7a; }

      /* controls help top-right */
      .hud-help {
        position: absolute; top: 0.7rem; right: 0.7rem; width: 21rem;
        background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 8px;
        padding: 0.5rem 0.7rem; font-size: 0.76rem; color: #aebccd; line-height: 1.5;
      }
      .hud-help b { color: var(--gold); }

      /* game over overlay */
      .hud-overlay {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        background: rgba(6,9,13,0.78); backdrop-filter: blur(3px);
      }
      .hud-over-box {
        text-align: center; padding: 2.2rem 3rem; border-radius: 14px;
        background: var(--panel); border: 2px solid var(--panel-edge);
      }
      .hud-over-box.win { border-color: #5fbf6a; }
      .hud-over-box.lose { border-color: #c44; }
      .hud-over-box h1 { margin: 0 0 0.5rem; font-size: 2.4rem; }
      .hud-over-box.win h1 { color: #7fe089; }
      .hud-over-box.lose h1 { color: #ff7a7a; }
      .hud-over-box p { color: #c6d2e0; margin: 0 0 1.2rem; }
      .hud-over-box button {
        font: inherit; font-size: 1rem; padding: 0.6rem 1.4rem; cursor: pointer;
        background: #2b6cb0; color: #fff; border: none; border-radius: 8px;
      }
      .hud-over-box button:hover { background: #3b82d6; }

      #loading {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #0b0f14; color: #8fa2b8; font-size: 1.1rem; z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="loading">Building the realm…</div>
    <canvas id="game"></canvas>
    <script type="module">
      import('/src/game/main.ts')
        .then(() => { const l = document.getElementById('loading'); if (l) l.remove(); })
        .catch((err) => {
          const l = document.getElementById('loading');
          if (l) l.textContent = 'Failed to start: ' + err;
          console.error(err);
        });
    </script>
  </body>
</html>
