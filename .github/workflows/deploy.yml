# Builds the Vite bundle and publishes it to the gh-pages branch, which
# GitHub Pages serves automatically — no repository settings required
# (the GITHUB_TOKEN cannot enable the "GitHub Actions" Pages source on
# this repo, so we deploy the classic branch-based way instead).
#
# Every push to main redeploys; you can also run it manually from the
# Actions tab ("Run workflow").
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

# Allow only one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: touch dist/.nojekyll
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
